# In-memory H2 — fresh DB on every restart while the cup/bracket/etc. logic is
# still being stabilized. Switch back to jdbc:h2:file:./data/footballmanager
# + ddl-auto=update once you want progress to persist across restarts.
spring.datasource.url=jdbc:h2:mem:footballmanager
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.h2.console.enabled=true

server.port=8086

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# ===== Hibernate batching =====
# Group INSERTs/UPDATEs of the same entity type into batch JDBC statements
# instead of one round-trip per row. Massive speedup for matchday saves where
# we write thousands of Scorer/ScorerLeaderboard/Human rows per day.
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true

# ===== Disable OpenEntityManagerInView =====
# Default true makes ONE EntityManager live for the whole HTTP request,
# so consecutive @Transactional calls within /game/advance share the same
# PersistenceContext. After processing 7 leagues sequentially, ~2500 entities
# accumulate — every save() autoflush dirty-checks all of them, causing
# linear per-comp slowdown (rating 447ms → 5031ms across comps in your log).
# Disabling forces each @Transactional method to use its own short-lived session.
spring.jpa.open-in-view=false