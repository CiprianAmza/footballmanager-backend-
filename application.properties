# In-memory H2 remains the local default. PostgreSQL/MySQL deployments must
# supply their datasource settings through deployment secrets. Never commit them.
spring.datasource.url=jdbc:h2:mem:${random.uuid};DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=false
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.h2.console.enabled=true

server.port=8086

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration/h2
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.sql.init.mode=never

server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax
server.servlet.session.cookie.secure=false

regent.enabled=false
cors.allowed-origins=http://localhost:4200

# ===== Hibernate batching =====
# Group INSERTs/UPDATEs of the same entity type into batch JDBC statements
# instead of one round-trip per row. Massive speedup for matchday saves where
# we write thousands of Scorer/ScorerLeaderboard/Human rows per day.
spring.jpa.properties.hibernate.jdbc.batch_size=50
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true

# ===== Disable OpenEntityManagerInView =====
# Default true makes ONE EntityManager live for the whole HTTP request,
# so consecutive @Transactional calls within /game/advance share the same
# PersistenceContext. After processing 7 leagues sequentially, ~2500 entities
# accumulate — every save() autoflush dirty-checks all of them, causing
# linear per-comp slowdown (rating 447ms → 5031ms across comps in your log).
# Disabling forces each @Transactional method to use its own short-lived session.
spring.jpa.open-in-view=false
