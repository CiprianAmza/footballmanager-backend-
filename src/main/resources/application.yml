# =============================================================
# Persistence — Hibernate JDBC batching
# =============================================================
# Batches UPDATE/DELETE statements during the heavy season
# transition. INSERT batching won't engage for IDENTITY-keyed
# entities (Team/Human/CompetitionTeamInfo/Scorer), but the
# config is harmless and helps UPDATE batching.
spring:
  flyway:
    enabled: true
    locations: classpath:db/migration/h2
    baseline-on-migrate: true
    baseline-version: 0
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        jdbc:
          batch_size: 30
        order_inserts: true
        order_updates: true
  sql:
    init:
      mode: never

server:
  servlet:
    session:
      cookie:
        http-only: true
        same-site: lax

cors:
  allowed-origins: http://localhost:4200

regent:
  enabled: false
  economy:
    currency: EUR
    manager-starting-wealth: 0
    chairman-starting-wealth-default: 10000000
    chairman-starting-wealth-min: 1000000
    chairman-starting-wealth-max: 10000000000

# =============================================================
# Matchday simulation scheduling
# =============================================================
# Independent competitions run on a bounded platform-thread pool. The planner
# serializes competitions that share teams and keeps European competitions on
# one lane, so player state and coefficient/draw state are not updated twice at
# the same time. Set enabled=false for an immediate sequential fallback.
simulation:
  training:
    # Ratings/skills are recalculated at most once every three weeks. Fitness
    # and the chance of a training injury are still processed per session.
    rating-update-interval-days: 21
  matchday:
    parallel:
      enabled: true
      workers: 4

# =============================================================
# General gameplay feature switches
# =============================================================
gameplay:
  # Temporary mode requested for long simulations. When true, injuries and
  # suspensions are neither generated nor considered for team availability.
  player-availability-disabled: true

# =============================================================
# Team Dynamics (CONCORD)
# =============================================================
# Master switch for the real Dynamics section: hierarchy, social groups,
# happiness, monthly team meeting and player conversations. Default OFF until
# rollout; when false the API returns explicit empty/disabled states.
dynamics:
  enabled: false

# =============================================================
# Global award weighting
# =============================================================
# Championships are ranked by the average rating of each club's best 11 players.
# Map keys are inclusive rank ceilings: 3 => positions 1-3 use x4, 5 => 4-5 use x3.
awards:
  weighting:
    league-strength:
      top-players-per-team: 11
      rank-multipliers:
        3: 4.0
        5: 3.0
        7: 2.0
      default-multiplier: 1.0
    golden-boot:
      goal-weight: 2.5
      assist-weight: 1.0

# =============================================================
# Match Engine Configuration
# =============================================================
# Single source of truth for every numeric constant that
# influences a match outcome. Sweep these via fuzz tests
# (-Pfuzz) or override per profile / @TestPropertySource.
# Defaults match the hardcoded values in MatchEngineConfig.java
# so behaviour is unchanged unless explicitly overridden.

match:
  animation:
    v3:
      enabled: false
      max-player-step: 0.9
      max-player-acceleration: 0.45
      max-ball-step: 4.0
  engine:

    # Compartment Engine V1 Phase 0/1 contract only. Nothing in the runtime scoring
    # path consumes this section yet; false is the mandatory legacy fallback gate.
    compartment:
      enabled: false
      rating:
        attribute-min: 1
        attribute-max: 20
        score-scale: 100.0
        context-factor-min: 0.60
        context-factor-max: 1.40
        total-context-min: 0.70
        total-context-max: 1.30
        context-coefficient-min: -1.0
        context-coefficient-max: 1.0
        role-fit-base: 0.85
        role-fit-range: 0.30
        fitness-floor: 0.70
        morale-neutral: 70.0
        morale-slope: 0.0004
        default-position-multiplier: 1.0
        default-role-multiplier: 1.0

      # Each attribute table sums to 1.0. Stable enum keys are mapped to the
      # existing PlayerSkillsService names only by a future runtime adapter.
