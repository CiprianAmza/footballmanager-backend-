    stats:
      possession-base: 50.0
      possession-edge-scale: 30.0
      possession-noise-sigma: 2.0
      home-possession-boost: 2.0
      passes-base: 450.0
      passes-noise-sigma: 20.0
      pass-accuracy-base: 78.0
