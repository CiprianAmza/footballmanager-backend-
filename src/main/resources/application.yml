    knockout:
      aet-win-chance-base: 0.35
      aet-win-chance-weight: 0.3
      extra-time-expected-goals: 1.0      # 30-min ET mini-match: far fewer goals than a full 90.
      penalty-weaker-team-win-chance: 0.5 # Shootout coin-flip; 0.55 gives the weaker side a slight edge.
      # NOTE: which knockout rounds are two-leg is tournament *structure* — it now lives in
      # CompetitionFormatConfig (the format single-source), not here.
