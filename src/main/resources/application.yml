      synthetic-red-card-chance: 0.05
      synthetic-red-card-min-minute: 20
      synthetic-red-card-max-minute: 91
      live-yellow-card-rate-min: 0.14
      live-yellow-card-rate-spread: 0.08
      live-red-card-base: 0.005
      live-red-card-per-foul: 0.002

    live:
      big-chances-baseline: 0.5
      big-chances-scale: 3.0
      big-chances-hard-cap: 4
      penalty-share: 0.15
      free-kick-share: 0.35
      attacker-pace-floor: 0.8
