# =============================================================
# Persistence — Hibernate JDBC batching
# =============================================================
# Batches UPDATE/DELETE statements during the heavy season
# transition. INSERT batching won't engage for IDENTITY-keyed
# entities (Team/Human/CompetitionTeamInfo/Scorer), but the
# config is harmless and helps UPDATE batching.
spring:
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 0
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        jdbc:
          batch_size: 30
        order_inserts: true
        order_updates: true
  sql:
    init:
      mode: never

server:
  servlet:
    session:
      cookie:
        http-only: true
        same-site: lax

cors:
  allowed-origins: http://localhost:4200

regent:
  enabled: false

# =============================================================
# Matchday simulation scheduling
# =============================================================
# Independent competitions run on a bounded platform-thread pool. The planner
# serializes competitions that share teams and keeps European competitions on
# one lane, so player state and coefficient/draw state are not updated twice at
# the same time. Set enabled=false for an immediate sequential fallback.
simulation:
  training:
    # Ratings/skills are recalculated at most once every three weeks. Fitness
    # and the chance of a training injury are still processed per session.
    rating-update-interval-days: 21
  matchday:
    parallel:
      enabled: true
      workers: 4

# =============================================================
# General gameplay feature switches
# =============================================================
gameplay:
  # Temporary mode requested for long simulations. When true, injuries and
  # suspensions are neither generated nor considered for team availability.
  player-availability-disabled: true

# =============================================================
# Global award weighting
# =============================================================
# Championships are ranked by the average rating of each club's best 11 players.
# Map keys are inclusive rank ceilings: 3 => positions 1-3 use x4, 5 => 4-5 use x3.
awards:
  weighting:
    league-strength:
      top-players-per-team: 11
      rank-multipliers:
        3: 4.0
        5: 3.0
        7: 2.0
      default-multiplier: 1.0
    golden-boot:
      goal-weight: 2.5
      assist-weight: 1.0

# =============================================================
# Match Engine Configuration
# =============================================================
# Single source of truth for every numeric constant that
# influences a match outcome. Sweep these via fuzz tests
# (-Pfuzz) or override per profile / @TestPropertySource.
# Defaults match the hardcoded values in MatchEngineConfig.java
# so behaviour is unchanged unless explicitly overridden.

match:
  engine:

    power:
      ratio-exponent: 2.0          # Math.pow(ratio, X). Higher = stronger dominates more.
      expected-goals-total: 3.0    # Total ~goals/match, split by adjusted ratio.
      max-goals-per-team: 7        # Hard cap to prevent Poisson tail blowups.
      morale-floor: 0.8            # morale=0 → power ×0.8 (tuner value).
      morale-spread: 0.4           # morale=100 → power ×1.2 (floor+spread).
      home-advantage: 1.08         # home side power ×1.08 (~+8%, tuner value).

    morale:
      tier-big-diff: 500           # Power-diff thresholds for outcome tiers.
      tier-mid-diff: 200
      tier-small-diff: 0
      # Win ranges (favorite → giant-killing)
      win-favorite-big:      { min: 0,  max: 1 }
      win-favorite:          { min: 1,  max: 2 }
      win-slight-favorite:   { min: 1,  max: 3 }
      win-slight-underdog:   { min: 2,  max: 5 }
      win-underdog:          { min: 4,  max: 7 }
      win-giant-killing:     { min: 5,  max: 10 }
      # Draw ranges
      draw-favorite-big:     { min: -6, max: -2 }
      draw-favorite:         { min: -4, max: 0 }
      draw-slight-favorite:  { min: -2, max: 1 }
      draw-slight-underdog:  { min: 1,  max: 3 }
      draw-underdog:         { min: 2,  max: 5 }
      draw-giant-hold:       { min: 3,  max: 7 }
      # Loss ranges (shocking → expected)
      loss-favorite-big:     { min: -15, max: -5 }
      loss-favorite:         { min: -8,  max: -3 }
      loss-slight-favorite:  { min: -5,  max: -2 }
      loss-slight-underdog:  { min: -3,  max: -1 }
      loss-underdog:         { min: -2,  max: 0 }
      loss-expected:         { min: -1,  max: 0 }
      bench-loss-penalty: -3
      bench-draw-penalty: -4
      bench-win-penalty: -2
      bench-consecutive-extra: -2
      bench-consecutive-threshold: 5
      contentment-drop-chance: 0.3
      min-matches-content: 5
      transfer-demand-chance-7-plus: 0.5
      transfer-demand-chance-5-plus: 0.3
      transfer-demand-chance-3-plus: 0.1
      individual-variance: 1.0

    tactic:
      tempo-high-multiplier: 1.25
      tempo-low-multiplier: 0.85
      man-advantage-attack-eleven: 1.0
      man-advantage-attack-ten: 0.7
      man-advantage-attack-nine: 0.5
      man-advantage-attack-eight: 0.35
      possession-shift-per-missing: 0.08

    stamina:
      base-cost-per-minute: 0.5
      min-attribute-multiplier: 0.15
      pace-discount-on-tempo: 0.5
      natural-fitness-recovery-max: 0.15
      position-goalkeeper: 0.4
      position-defender: 0.75
      position-def-mid: 1.0
      position-midfielder: 1.15
      position-att-mid: 1.05
      position-striker: 0.85
      stamina-pick-floor: 0.5
      stamina-pick-range: 0.5
      post-match-dampening: 0.7
      post-match-floor: 20.0
      start-stamina-min: 20.0
      start-stamina-max: 100.0
      batch-match-fitness-drain: 8.0

    training:
      facility-base: 0.5
      facility-divisor: 20.0
      youth-max-age: 22
      scale-fitness-gain: true

    injuries:
      base-chance: 0.002
      low-fitness-bonus: 0.001
      low-fitness-threshold: 50.0
      minor-threshold: 0.55
      moderate-threshold: 0.85
      minor-min-days: 1
      minor-max-days: 3
      moderate-min-days: 4
      moderate-max-days: 8
      serious-min-days: 10
      serious-max-days: 20

    fouls:
