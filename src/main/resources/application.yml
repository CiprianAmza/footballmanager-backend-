      probability:
        matchup-exponent: 1.5
        home-advantage: 1.08
        gamma-shape: 12.0
        goal-cap: 7
        extra-time-scale: 0.3333333333333333
        interval-lower-quantile: 0.05
        interval-upper-quantile: 0.95

    power:
      ratio-exponent: 2.0          # Math.pow(ratio, X). Higher = stronger dominates more.
      expected-goals-total: 3.0    # Total ~goals/match, split by adjusted ratio.
      max-goals-per-team: 7        # Hard cap to prevent Poisson tail blowups.
      morale-floor: 0.8            # morale=0 → power ×0.8 (tuner value).
      morale-spread: 0.4           # morale=100 → power ×1.2 (floor+spread).
      home-advantage: 1.08         # home side power ×1.08 (~+8%, tuner value).

    morale:
      tier-big-diff: 500           # Power-diff thresholds for outcome tiers.
      tier-mid-diff: 200
      tier-small-diff: 0
      # Win ranges (favorite → giant-killing)
      win-favorite-big:      { min: 0,  max: 1 }
      win-favorite:          { min: 1,  max: 2 }
      win-slight-favorite:   { min: 1,  max: 3 }
      win-slight-underdog:   { min: 2,  max: 5 }
      win-underdog:          { min: 4,  max: 7 }
      win-giant-killing:     { min: 5,  max: 10 }
      # Draw ranges
